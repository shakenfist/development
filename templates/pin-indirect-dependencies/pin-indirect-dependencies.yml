# Reconciles the pinned indirect (transitive) dependency block in
# pyproject.toml against what the direct dependencies actually require,
# and creates a PR when it changed -- adding pins for new transitive
# dependencies and removing pins nothing requires any more. This
# complements Renovate, which bumps the versions of existing pins.
#
# The heavy lifting lives in tools/pin-indirect-dependencies.sh (copied
# from this template directory), which demotes the existing pins to pip
# constraints for a fresh resolve. See that script's header comment for
# details, including the "# never-pin: <name>" escape hatch.
#
# Requirements:
#   - pyproject.toml must contain "# START_OF_INDIRECT_DEPS" and
#     "# END_OF_INDIRECT_DEPS" marker comments delimiting the pinned
#     block inside the [project] dependencies list.
#   - pin-indirect-dependencies.sh from this template directory copied
#     to tools/pin-indirect-dependencies.sh (keep it executable).
#   - A repository secret called DEPENDENCIES_TOKEN with push and PR
#     permissions.
#
# Placeholders to replace:
#   {{PROJECT_NAME}}  -- repository / checkout directory name
#
# Template source: shakenfist/development/templates/pin-indirect-dependencies/

name: Pin indirect dependencies

permissions:
  contents: read

on:
  pull_request:
    paths:
      - .github/workflows/pin-indirect-dependencies.yml
      - tools/pin-indirect-dependencies.sh
  workflow_dispatch:
  schedule:
    - cron: '00 00 * * *'        # utc

jobs:
  indirect-dependencies:
    runs-on: [self-hosted, vm, debian-12]
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Set environment variables
        run: |
          echo "SHAKENFIST_NAMESPACE=$(hostname)" >> $GITHUB_ENV

      - name: Checkout {{PROJECT_NAME}}
        uses: actions/checkout@v6
        with:
          path: {{PROJECT_NAME}}
          fetch-depth: 0

      # Add any additional system-level build dependencies here. The
      # resolve runs in an isolated venv, so anything which compiles at
      # install time needs its build dependencies present. For example,
      # kerbside needs:
      #   sudo apt install -y pkg-config build-essential python3-dev \
      #       default-libmysqlclient-dev

      - name: Install the github command line
        run: |
          sudo apt update
          sudo apt install -y curl

          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null

          sudo apt update
          sudo apt install -y gh

      - name: Install system build dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=-1 -o Dpkg::Options::="--force-confold" -y \
            install git python3-dev python3-pip python3-venv python3-wheel

      - name: Reconcile pinned indirect dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.DEPENDENCIES_TOKEN }}
        run: |
          cd ${GITHUB_WORKSPACE}/{{PROJECT_NAME}}
          tools/pin-indirect-dependencies.sh
