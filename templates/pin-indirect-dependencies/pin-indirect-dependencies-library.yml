# Detects unpinned indirect (transitive) dependencies and creates a PR
# to record them in pyproject.toml as an optional "pinned" extra.
#
# This is the LIBRARY variant of the indirect dependency pinning
# workflow.  Unlike the application variant (which hard-pins indirect
# deps in the main [project] dependencies list), this variant adds
# them to [project.optional-dependencies] under a "pinned" extra so
# that end users are not forced into specific transitive versions.
#
# Users who want the exact tested dependency set can install with:
#   pip install package[pinned]
#
# Requirements:
#   - pyproject.toml must have a [project.optional-dependencies]
#     section with a "pinned" list containing a
#     "# END_OF_INDIRECT_DEPS" marker comment.
#   - A repository secret called DEPENDENCIES_TOKEN with push and PR
#     permissions.
#
# Placeholders to replace:
#   {{PROJECT_NAME}}  -- repository / checkout directory name
#
# Template source: shakenfist/development/templates/pin-indirect-dependencies/

name: Pin indirect dependencies

permissions:
  contents: read

on:
  pull_request:
    paths:
      - .github/workflows/pin-indirect-dependencies.yml
  workflow_dispatch:
  schedule:
    - cron: '00 00 * * *'        # utc

jobs:
  indirect-dependencies:
    runs-on: [self-hosted, vm, debian-12]
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Set environment variables
        run: |
          echo "SHAKENFIST_NAMESPACE=$(hostname)" >> $GITHUB_ENV

      - name: Checkout {{PROJECT_NAME}}
        uses: actions/checkout@v6
        with:
          path: {{PROJECT_NAME}}
          fetch-depth: 0

      # Add any additional system-level build dependencies here.
      # For example, kerbside needs:
      #   sudo apt install -y pkg-config build-essential python3-dev \
      #       default-libmysqlclient-dev

      - name: Install the github command line
        run: |
          sudo apt update
          sudo apt install -y curl

          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null

          sudo apt update
          sudo apt install -y gh

      - name: Install all our dependencies in a venv
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=-1 -o Dpkg::Options::="--force-confold" -y \
            install git python3-cffi python3-dev python3-grpcio python3-pip python3-venv python3-wheel

          cd ${GITHUB_WORKSPACE}/{{PROJECT_NAME}}
          python3 -m venv --system-site-packages ${RUNNER_TEMP}/venv
          . ${RUNNER_TEMP}/venv/bin/activate
          pip3 install uv
          uv pip install -r pyproject.toml

      - name: List all our dependencies
        run: |
          ${RUNNER_TEMP}/venv/bin/pip freeze --local

      - name: Ensure all dependencies are pinned
        env:
          GITHUB_TOKEN: ${{ secrets.DEPENDENCIES_TOKEN }}
        run: |
          cd ${GITHUB_WORKSPACE}/{{PROJECT_NAME}}

          datestamp=$(date "+%Y%m%d")
          git checkout -b pin-dependencies-${datestamp}

          for depver in $(${RUNNER_TEMP}/venv/bin/pip freeze --local); do
            dep=$(echo ${depver} | sed 's/==.*//')

            if [ $(egrep -ic "${dep}==" pyproject.toml) -lt 1 ]; then
              sed -i pyproject.toml "s/    # END_OF_INDIRECT_DEPS/    \"${depver}\",\n    # END_OF_INDIRECT_DEPS/"
            fi
          done

          # Did we find something new?
          if [ $(git diff | wc -l) -gt 0 ]; then
            echo "New dependencies detected..."
            echo
            git diff

            git config --global user.name "shakenfist-bot"
            git config --global user.email "bot@shakenfist.com"
            git commit -a -m "Update pinned dependencies."
            git push -f origin pin-dependencies-${datestamp}
            echo
            # Ensure the label exists before creating the PR
            gh label create dependencies --color 0075ca \
                --description "Pull requests that update a dependency file" \
                2>/dev/null || true

            gh pr create \
                --assignee mikalstill \
                --reviewer mikalstill \
                --title "Update pinned dependencies." \
                --body "New indirect dependencies were detected." \
                --label dependencies
            echo
            echo "Pull request created."
          fi
